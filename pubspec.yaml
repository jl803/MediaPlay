name: mediaplay
description: "A media player designed using flutter/dart"
publish_to: 'none'

version: 1.0.0+2 # Incremented version code for the update

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  provider: ^6.1.2
  video_player: ^2.8.1
  chewie: ^1.7.1
  path: ^1.9.1
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.2
  sqflite: ^2.3.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
