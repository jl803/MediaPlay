name: mediaplay
description: "A media player designed using flutter/dart"
publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  file_picker: ^10.3.10
  provider: ^6.1.2
  video_player: ^2.11.1
  chewie: ^1.13.0
  just_audio: ^0.10.5
  path: ^1.9.1
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  sqflite: ^2.3.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
